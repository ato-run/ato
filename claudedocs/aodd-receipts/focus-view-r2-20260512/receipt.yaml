      automation socket listening socket=/tmp/ato-aodd/ato-home/run/ato-desktop-42210.sock
      host action dispatched via automation socket action=OpenAppWindowExperiment
      OpenAppWindowExperiment handler entered
      calling open_app_window
      open_app_window returned Ok
      host action dispatched via automation socket action=OpenCardSwitcher
      ...

