usecase: "First-time publisher completes the Dock Publishing Wizard end-to-end (Source Input → Install & Manifest → Verification → App Preview → Submit) for a GitHub-hosted static HTML capsule"
actor: "Autonomous agent simulating a first-time capsule publisher; macOS Accessibility permissions denied; operating via MCP automation socket (host_dispatch_action) for window management and direct CLI for ato commands"
goal: "Capsule koh0920/hello-capsule appears in Store Listings with Listing=Listed and Review=Approved after all five wizard steps complete"
entry_point: "ato-desktop running (PID 56807); dock window pre-opened from a prior session at App Preview / Step 4; source: https://github.com/Koh0920/hello-capsule"
out_of_scope:
  - "Steps 1–3 (Source Input, Install & Manifest, Verification) were already completed in a prior session; this run began at Step 4"
  - "Interactive drag / window-move / Spaces verification"
  - "Accessibility-gated osascript keystroke injection (Accessibility permission denied in this session)"
time_budget: "90 minutes (multi-part session)"

result: "degraded"

steps:
  - action: "Identify which ato-desktop window is the dock publishing wizard vs the launcher (ato-start)"
    observation: |
      The nav bar URL (capsule://desktop.ato.run/start) showed the WRONG window because the bar
      reflects the Most-Recently-Used window, not the currently focused one.
      Mission Control (Ctrl+Up) revealed three separate windows: ato-start (dark theme / launch),
      ato-dock (light theme / publish wizard — already at App Preview), and ato-store.
    stuck_at: "nav-bar-url-misleads-window-identity"

  - action: "Attempt to navigate to dock window via URL scheme: open 'capsule://run.ato.desktop/dock'"
    observation: |
      The command did not reliably bring the dock window to front. The URL scheme handler is
      registered in GPUI but calling it from a background process (terminal) did not consistently
      focus the existing dock window.
    stuck_at: "url-scheme-open-unreliable-for-window-focus"

  - action: "Discover and use MCP automation socket (host_dispatch_action) to bring dock to front"
    observation: |
      Found socket path via ~/.ato/run/ato-desktop-current.json → PID-qualified Unix socket.
      Sent: {"jsonrpc":"2.0","method":"host_dispatch_action","id":1,"params":{"action":"OpenDockWindow"}}
      Response: {"ok":true,"queued_action":"OpenDockWindow"} — dock window focused successfully.
      This is the correct bypass for macOS Accessibility permission restrictions.

  - action: "Read the App Preview panel (Step 4) — screenshot dock_step4_detail.png"
    observation: |
      Red error banner: "Preview exited with status exit status: 1"
      Startup Logs show:
        × Configuration error: capsule.lock.json manifest hash mismatch
          (expected blake3:7d1b31d...d963b, got blake3:5aeeff5...c06)
          help: Run `ato lock` to regenerate .ato/derived/capsule.lock.json
      This is error E207. The lockfile was generated before capsule.toml was modified in Step 2
      (Install & Manifest), causing hash divergence.
    stuck_at: "e207-manifest-hash-mismatch-blocks-preview"

  - action: "Click 'Start preview' retry button inside the dock wizard (coordinates calibrated from Retina screenshot)"
    observation: |
      Preview re-ran but hit the same E207 because the lockfile was not yet regenerated.
      The dock wizard provides no 'Run ato lock' button or automatic lockfile repair.

  - action: "Run `ato lock` from terminal in the working directory ~/.ato/dock/sources/dock-18afd44c9efaa668/hello-capsule/"
    observation: |
      "Generated lockfile: ./.ato/derived/capsule.lock.json" — lockfile regenerated successfully.
      This required knowing the internal working directory path; the dock wizard does not surface
      the workspace path to the user.

  - action: "Run `ato run .` to test preview after lockfile fix"
    observation: |
      E207 is gone. New error: E302 — ExecutionPlan consent required for target=app.
      The console provides the consent command:
        ato internal consent approve-execution-plan \
          --scoped-id hello-capsule --version 0.1.0 --target-label app \
          --policy-segment-hash blake3:debd41... --provisioning-policy-hash blake3:6ce8e6...
      The dock preview panel shows no consent approval modal; the desktop modal mechanism
      (shown in ato-start's launch flow) does not trigger during the dock preview context.
    stuck_at: "e302-consent-modal-not-shown-in-dock-preview"

  - action: "Approve execution plan via CLI: ato internal consent approve-execution-plan [...]"
    observation: "Exit 0 — consent stored in ~/.ato/consent/executionplan_v1.jsonl"

  - action: "Attempt to run hello-capsule on port 8080 (as declared in capsule.toml)"
    observation: |
      Port 8080 occupied by code-server (homebrew launchd service, auto-restarting).
      code-server has a supervisor that respawns child processes; killing individual node PIDs
      does not free the port. `launchctl stop homebrew.mxcl.code-server` sent SIGTERM but
      the service respawned before `ato run` could bind.
      The dock wizard provides no port-conflict detection or alternative-port guidance.
    stuck_at: "port-conflict-no-wizard-guidance"

  - action: "Change capsule.toml port from 8080 to 9090 (free port), run `ato lock`, approve new consent hashes"
    observation: |
      Needed three CLI operations:
        1. sed -i '' 's/^port = 8080/port = 9090/' capsule.toml
        2. ato lock  (new lockfile hash: matches updated capsule.toml)
        3. ato internal consent approve-execution-plan --policy-segment-hash blake3:fed1f3... ...
      Consent re-approval was necessary because policy hash changed when port changed.
      The dock wizard's DockRuntimeState.manifest_toml (saved in Step 2) now diverges from
      the on-disk capsule.toml — UI shows old port 8080, but ato run uses new 9090.

  - action: "Verify ato run works: timeout 6 ato run .; curl http://127.0.0.1:9090/"
    observation: |
      Server started on port 9090.
      curl response: <!DOCTYPE html><html lang="en">... (hello-capsule index.html served).
      ato-static logs: GET / -> 200

  - action: "Click 'Start preview' in dock window (after dispatching OpenDockWindow via MCP socket)"
    observation: |
      First click attempt at viewed coords (634, 292) → worked (logical 657, 303).
      Preview started. Red error banner disappeared.
      Dock App Preview panel shows hello-capsule iframe with:
        🎉 Hello Capsule (heading)
        Capsule Context (Data URL, App URL, Data DID — all "not set")
        Data Content — No Context
      Startup Logs show: [ato-static] GET / -> 200 repeated.
      Preview URL: http://127.0.0.1:9090/

  - action: "Click 'Continue' to advance from Step 4 (App Preview) to Step 5 (Submit)"
    observation: |
      First attempt at logical (1163, 810) — MISS: used viewed-image coords directly instead
      of converting to logical screen coords (scale 1.0375 for 2880x1800 Retina display).
      Second attempt at logical (1207, 840) [= viewed 1163×810 × 1.0375] — advanced to Step 5.

  - action: "Inspect Step 5 (Submit) — screenshot step5_submit.png"
    observation: |
      Visibility options: Public (selected) and Limited.
      Note: "Visibility selection is UI-only in this version and does not affect the publish payload."
      Submit to Store card: 'Submit runs ato publish --deploy --json and registers your capsule'
      "Submit capsule" blue button visible.

  - action: "Click 'Submit capsule' button (after dispatching OpenDockWindow)"
    observation: |
      Blue banner appeared: "Running ato publish --deploy --json"
      10 seconds later: dock wizard closed, Store Listings view appeared.
      Listing: koh0920/hello-capsule — Visibility=Public, Listing=Listed, Review=Approved, Updated=Just now
      Review Timeline: Submitted → In Review → Approved (all complete)
      LAST PUBLISH: "Publish completed."

agent_observation:
  user_visible_problem: |
    A first-time publisher completing the Dock Wizard will hit three hard blocks before
    App Preview works:

    1. E207 (manifest hash mismatch): The wizard modifies capsule.toml in Step 2
       (Install & Manifest) but does NOT regenerate capsule.lock.json afterward.
       When App Preview tries to run the capsule, it fails with a cryptic hash mismatch
       error. There is no "Fix this" button; the user must know to run `ato lock` manually.

    2. E302 (consent required): After fixing E207, the first `ato run` invocation needs
       execution plan consent. The ato-desktop desktop consent modal is NOT triggered during
       the dock preview flow — the consent error is only visible in the Startup Logs text,
       and the resolution requires running a multi-flag CLI command that is not shown in
       the wizard UI.

    3. Port conflict: If port 8080 is occupied (e.g., by a running dev tool), the preview
       silently fails with "exit status: 1". The wizard does not check port availability
       before starting the preview, does not suggest an alternative port, and does not
       provide guidance on freeing the port.

  likely_cause: |
    E207: capsule.lock.json is generated at `ato pack` time (Step 3 Verification) but
    Step 2 (Install & Manifest) overwrites capsule.toml after the lockfile was generated
    in an earlier session. No post-save `ato lock` call is triggered from the dock Rust handler.

    E302: `start_preview_blocking` in dock.rs spawns `ato run <dir>` as a child process
    whose stderr is streamed to the Startup Logs panel. When `ato run` exits with E302,
    it emits the consent command as a JSON envelope to stderr but the dock only displays
    raw log text — it does not parse the interactive_resolution field to surface an
    "Approve" button.

    Port conflict: The dock calls `ato run <dir>` without checking if the declared port is
    free. The web runtime (ato-static/nacelle) fails to bind and exits, but the failure
    reason (EADDRINUSE) is buried in stderr.

  suggested_fix:
    - |
      [E207 / lockfile] After SaveManifest IPC in dock.rs, automatically run `ato lock`
      in the working_directory to regenerate capsule.lock.json. Alternatively, before
      starting preview, check if the lockfile hash matches capsule.toml and if not,
      show a banner: "Manifest changed since last lock. Regenerating..." with an auto-fix.
    - |
      [E302 / consent] Parse stderr JSON from the `ato run` child process in
      stream_preview_output. If the JSON contains "code":"ATO_ERR_EXECUTION_CONTRACT_INVALID"
      and "interactive_resolution":true, extract the consent parameters and show a
      modal/inline button: "Approve execution plan" that calls
      `ato internal consent approve-execution-plan [params]` and auto-retries the preview.
    - |
      [Port conflict] Before spawning `ato run`, extract the `port` field from capsule.toml
      and attempt to bind a test TCP socket to confirm the port is free. If occupied, show
      an inline warning: "Port 8080 is in use. Change to [suggest next free port] or free
      the port before starting preview." Provide a one-click "Use port XXXX instead" action
      that patches capsule.toml, re-runs `ato lock`, and retries.
    - |
      [Nav bar confusion] The top nav bar URL should reflect the CURRENTLY FOCUSED window,
      not the most-recently-opened one. When the dock window is frontmost, the bar should
      show capsule://run.ato.desktop/dock (or a breadcrumb like "Store Listings / New Capsule").
    - |
      [Step 2→3 lockfile sync] Add a visual indicator in Step 3 (Verification) that shows
      whether the lockfile is in sync with capsule.toml. If out of sync, show a "Sync lockfile"
      button before the verification phase runs.

