  - desktop-log-excerpt: |
      ATO_DESKTOP_MULTI_WINDOW=1 — booting Focus View mode
      addChildWindow attached Control Bar to AppWindow
      Focus View AppWindow opened at startup
      automation socket listening socket=/tmp/ato-aodd/ato-home/run/ato-desktop-65005.sock
      Focus-mode automation dispatcher started
      focus dispatcher routes action action=OpenAppWindowExperiment
      OpenAppWindowExperiment handler entered
      calling open_app_window
      addChildWindow attached Control Bar to AppWindow
      open_app_window returned Ok
