[package]
name = "ato-desktop"
version = "0.1.0"
edition = "2021"
authors = ["ato-run"]
description = "The universal user plane for executing and orchestrating sandboxed app capsules."
build = "build.rs"

[dependencies]
anyhow = "1.0"
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed" }
gpui-component = { git = "https://github.com/longbridge/gpui-component" }
http = "1.4.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
url = "2.5.4"
wry = { version = "0.55.0", features = ["protocol"] }
