[meta]
title = "wasm-hello: minimal Wasm capsule via wasmtime"
runtime = "wasm/wasmtime"
difficulty = "intermediate"
tier = "01-capabilities"
tags = ["wasm", "wasmtime", "runtime"]

[run]
cmd = "ato run ."
timeout_s = 30

[expect]
exit_code = 0
stdout_regex = "hello from wasm capsule"

[platforms]
linux = "full"
macos = "full"

[compat]
min_ato_version = "0.4.69"
tested_against = ["0.4.69"]
