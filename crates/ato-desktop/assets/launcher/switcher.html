<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>開いているウィンドウ</title>
<style>
  :root {
    /* Dark Mission-Control-like backdrop — system-mode feel that
       distinguishes the switcher from regular content windows. */
    --bg-base: #1f1f23;
    --bg-blob: #2a2a31;
    --card-bg: #ffffff;
    --border:  #e4e4e7;
    --text:    #18181b;       /* used on white cards */
    --text-on-dark: #f4f4f5;
    --muted:   #71717a;
    --muted-on-dark: #a1a1aa;
    --soft:    #a1a1aa;
    --soft-on-dark: #71717a;
    --accent:  #818cf8;       /* indigo-400 — readable on dark */
    --accent-bg: #eef2ff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 18% 8%,  var(--bg-blob) 0%, transparent 60%),
      radial-gradient(900px 500px at 82% 92%,  #25252b 0%, transparent 65%),
      var(--bg-base);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    color: var(--text-on-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding: 28px 24px;
    -webkit-user-select: none;
    user-select: none;
  }

  /* HEADER */
  .header { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .header-puck {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(99, 102, 241, 0.35);
  }
  .header-puck svg { width: 22px; height: 22px; }
  .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-on-dark); }
  .header p { margin: 0; font-size: 13px; color: var(--muted-on-dark); }

  /* CARDS */
  .cards { display: flex; gap: 16px; align-items: stretch; flex-wrap: nowrap; }
  .card {
    width: 220px; height: 300px;
    background: var(--card-bg);
    border: 1px solid transparent;
    border-radius: 18px;
    display: flex; flex-direction: column;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    /* On a dark backdrop the cards need a deeper shadow to read as
       "lifted" rather than embedded. */
    box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
    color: var(--text);
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
  }
  .card.active {
    border: 2px solid var(--accent);
    box-shadow: 0 14px 32px rgba(99, 102, 241, 0.45);
  }
  .card-head {
    padding: 12px 12px 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-icon {
    width: 26px; height: 26px; border-radius: 7px;
    color: #fff; font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .card-icon svg { width: 14px; height: 14px; }
  .dock-tile svg { width: 18px; height: 18px; }
  .card-title {
    font-size: 13.5px; font-weight: 600;
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-preview {
    flex: 1;
    margin: 0 12px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: #fafafa;
  }
  .card-foot {
    padding: 10px 12px;
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* NEW WINDOW TILE — translucent against the dark backdrop */
  .card.new-window {
    background: rgba(255, 255, 255, 0.05);
    border: 2px dashed rgba(255, 255, 255, 0.18);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    box-shadow: none;
    color: var(--text-on-dark);
  }
  .card.new-window:hover {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.08);
  }
  .new-window-puck {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(129, 140, 248, 0.18);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 300; line-height: 1;
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.30);
  }
  .new-window-label { font-size: 14px; font-weight: 600; }
  .new-window-sub { font-size: 11.5px; color: var(--muted-on-dark); }

  /* FOOTER */
  .footer { font-size: 11px; color: var(--muted-on-dark); }

  /* SEARCH — Safari Tab Overview-style filter input */
  .switcher-search {
    width: 320px; height: 36px; padding: 0 14px;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .switcher-search:focus-within {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(129, 140, 248, 0.55);
  }
  .switcher-search svg { width: 14px; height: 14px; color: var(--muted-on-dark); flex-shrink: 0; }
  .switcher-search input {
    flex: 1; border: 0; outline: 0; background: transparent;
    color: var(--text-on-dark); font: inherit; font-size: 13px;
  }
  .switcher-search input::placeholder { color: var(--muted-on-dark); }

  /* Real-screenshot variant — fills the preview area edge-to-edge,
     no padding, no background. */
  .pv-real { width: 100%; height: 100%; }
  .pv-real img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top left;
    display: block;
  }

  /* Cards hidden by search filter */
  .card.hidden { display: none; }

  /* DOCK — frosted dark glass pill */
  .dock {
    display: flex; gap: 10px; align-items: center;
    padding: 8px 14px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 999px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
  }
  .dock-tile {
    width: 42px; height: 42px; border-radius: 12px;
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.12s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.45);
  }
  .dock-tile:hover { transform: translateY(-3px) scale(1.05); }
  .dock-tile.plus {
    background: rgba(129, 140, 248, 0.20);
    color: var(--accent);
    font-size: 22px; font-weight: 300;
    box-shadow: 0 4px 10px rgba(99, 102, 241, 0.30);
  }

  /* === PER-KIND PREVIEWS === */

  /* AppWindow — dashboard with line chart + stat tiles */
  .pv-app {
    width: 100%; height: 100%; padding: 10px 10px 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pv-app-head { display: flex; align-items: center; justify-content: space-between; }
  .pv-app-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    color: #fff; font-weight: 600;
  }
  .pv-app-pct { font-size: 11px; font-weight: 700; }
  .pv-app-chart { flex: 1; }
  .pv-app-chart svg { width: 100%; height: 100%; display: block; }
  .pv-app-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 8.5px; }
  .pv-app-stat {
    background: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 3px 5px;
    display: flex; flex-direction: column; gap: 1px;
  }
  .pv-app-stat-label { color: var(--soft); font-size: 7.5px; }
  .pv-app-stat-value { font-weight: 700; font-size: 9.5px; }

  /* Store — list of "package" rows */
  .pv-store {
    width: 100%; height: 100%; padding: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .pv-store-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 6px;
    background: rgba(255,255,255,0.85);
    border-radius: 6px;
  }
  .pv-store-icon { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .pv-store-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .pv-store-name { height: 4px; border-radius: 2px; background: #d4d4d8; width: 70%; }
  .pv-store-sub  { height: 3px; border-radius: 2px; background: #e4e4e7; width: 50%; }
  .pv-store-arrow { width: 6px; height: 6px; border-right: 1px solid var(--soft); border-top: 1px solid var(--soft); transform: rotate(45deg); }

  /* Start — mini start page mock */
  .pv-start {
    width: 100%; height: 100%; padding: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .pv-start-search {
    height: 14px;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0 6px;
    display: flex; align-items: center; gap: 3px;
  }
  .pv-start-search-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--soft); }
  .pv-start-search-line { height: 2px; flex: 1; background: #e4e4e7; border-radius: 1px; }
  .pv-start-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 4px; }
  .pv-start-tile {
    height: 28px;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .pv-start-tile-puck { width: 9px; height: 9px; border-radius: 2px; }
  .pv-start-tile-label { height: 2.5px; border-radius: 1px; background: #d4d4d8; width: 70%; }
  .pv-start-list {
    display: flex; flex-direction: column; gap: 3px; margin-top: 2px;
  }
  .pv-start-list-row {
    height: 12px;
    background: rgba(255,255,255,0.9);
    border-radius: 4px;
    display: flex; align-items: center; gap: 4px;
    padding: 0 5px;
  }
  .pv-start-list-icon { width: 6px; height: 6px; border-radius: 1.5px; }
  .pv-start-list-text { flex: 1; height: 2px; background: #e4e4e7; border-radius: 1px; }

  /* Launcher — settings: left nav + main rows */
  .pv-launcher {
    width: 100%; height: 100%; padding: 9px;
    display: flex; gap: 7px;
  }
  .pv-launcher-nav {
    width: 32%;
    background: rgba(255,255,255,0.85);
    border-radius: 6px;
    padding: 6px 4px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .pv-launcher-nav-row {
    height: 5px; border-radius: 2px; background: var(--border);
  }
  .pv-launcher-nav-row.active { background: var(--accent); }
  .pv-launcher-main {
    flex: 1; display: flex; flex-direction: column; gap: 5px;
  }
  .pv-launcher-card {
    background: rgba(255,255,255,0.9);
    border-radius: 5px;
    padding: 5px;
    display: flex; align-items: center; gap: 4px;
  }
  .pv-launcher-card-icon { width: 12px; height: 12px; border-radius: 3px; }
  .pv-launcher-card-bars { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pv-launcher-card-bar { height: 2.5px; border-radius: 1.5px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-puck">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="18" rx="2"/>
      <rect x="14" y="3" width="7" height="11" rx="2"/>
      <rect x="14" y="17" width="7" height="4" rx="2"/>
    </svg>
  </div>
  <h1>開いているウィンドウ</h1>
  <p id="subtitle">現在のセッションを切り替えます</p>
</div>

<!-- Safari Tab Overview-style search/filter -->
<div class="switcher-search">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input id="filter" placeholder="ウィンドウを絞り込む" autofocus>
</div>

<div id="cards" class="cards"></div>

<div class="footer">クリックで切り替え、Esc または背景クリックで閉じる</div>

<div id="dock" class="dock"></div>

<script>
  const BRIDGE = (window.ipc && window.ipc.postMessage)
    ? (m) => window.ipc.postMessage(JSON.stringify(m))
    : (m) => console.log('[no bridge]', m);

  const WINDOWS = window.__ATO_WINDOWS || [];

  // Glyph library — mirrors the legacy sidebar's per-kind icon
  // vocabulary. Rust picks the glyph name via `glyph_for(title, kind)`
  // and the HTML renders it tinted white inside the existing
  // accent-coloured badge / dock tile background.
  const GLYPH = {
    chart:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="18" y1="20" x2="18" y2="11"/></svg>',
    terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 8 10 12 6 16"/><line x1="13" y1="16" x2="18" y2="16"/></svg>',
    search:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    chat:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-8 8 8.5 8.5 0 0 1-3.6-.8L4 21l1.6-4.4A8 8 0 0 1 5 12a8 8 0 0 1 16 0z"/></svg>',
    cpu:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.4"/><rect x="9" y="9" width="6" height="6" rx="0.5"/><line x1="3" y1="9" x2="6" y2="9"/><line x1="3" y1="15" x2="6" y2="15"/><line x1="18" y1="9" x2="21" y2="9"/><line x1="18" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="6"/><line x1="15" y1="3" x2="15" y2="6"/><line x1="9" y1="18" x2="9" y2="21"/><line x1="15" y1="18" x2="15" y2="21"/></svg>',
    code:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 7 3 12 8 17"/><polyline points="16 7 21 12 16 17"/></svg>',
    store:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14l-1 12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>',
    sparkle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><path d="M5.6 5.6l2.1 2.1"/><path d="M16.3 16.3l2.1 2.1"/><path d="M5.6 18.4l2.1-2.1"/><path d="M16.3 7.7l2.1-2.1"/></svg>',
    panel:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="8" height="16" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="6" rx="1.5"/></svg>',
  };
  function glyphOrLetter(entry) {
    return (entry.glyph && GLYPH[entry.glyph]) || escapeHtml(initial(entry.title));
  }

  const PALETTE = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6'];
  function accentFor(title) {
    let h = 0; for (let i = 0; i < title.length; i++) h = ((h * 31) + title.charCodeAt(i)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }
  function initial(title) { return (title || '?').trim().charAt(0).toUpperCase(); }
  function withAlpha(hex, alpha) {
    const v = parseInt(hex.slice(1), 16);
    const r = (v >> 16) & 0xff, g = (v >> 8) & 0xff, b = v & 0xff;
    return `rgba(${r},${g},${b},${alpha})`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function previewAppWindow(accent, idx) {
    // Soft accent wash + line chart + 4 stat tiles.
    const gid = `g-${idx}`;
    const points = [
      [0,28],[14,22],[28,25],[42,16],[56,19],[70,9],[84,12],[100,4]
    ];
    const line = points.map(p => p.join(',')).join(' ');
    const fill = `${line} 100,40 0,40`;
    return `
      <div class="pv-app" style="background:${withAlpha(accent, 0.10)}">
        <div class="pv-app-head">
          <div class="pv-app-tag" style="background:${accent}">アクティブ</div>
          <div class="pv-app-pct" style="color:${accent}">93%</div>
        </div>
        <div class="pv-app-chart">
          <svg viewBox="0 0 100 36" preserveAspectRatio="none">
            <defs>
              <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${accent}" stop-opacity="0.45"/>
                <stop offset="100%" stop-color="${accent}" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon points="${fill}" fill="url(#${gid})"/>
            <polyline points="${line}" fill="none" stroke="${accent}" stroke-width="1.4" stroke-linejoin="round"/>
            ${points.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="1.2" fill="${accent}"/>`).join('')}
          </svg>
        </div>
        <div class="pv-app-stats">
          <div class="pv-app-stat">
            <span class="pv-app-stat-label">セッション</span>
            <span class="pv-app-stat-value">1,240</span>
          </div>
          <div class="pv-app-stat">
            <span class="pv-app-stat-label">同期</span>
            <span class="pv-app-stat-value" style="color:${accent}">92%</span>
          </div>
        </div>
      </div>`;
  }

  function previewStore(accent) {
    const rows = [
      { hue: '#0ea5e9' }, { hue: '#10b981' },
      { hue: '#f59e0b' }, { hue: '#ec4899' }, { hue: '#a855f7' },
    ];
    return `
      <div class="pv-store" style="background:${withAlpha(accent, 0.08)}">
        ${rows.map(r => `
          <div class="pv-store-row">
            <div class="pv-store-icon" style="background:${r.hue}"></div>
            <div class="pv-store-text">
              <div class="pv-store-name"></div>
              <div class="pv-store-sub"></div>
            </div>
            <div class="pv-store-arrow"></div>
          </div>
        `).join('')}
      </div>`;
  }

  function previewStart(accent) {
    return `
      <div class="pv-start" style="background:${withAlpha(accent, 0.08)}">
        <div class="pv-start-search">
          <div class="pv-start-search-dot"></div>
          <div class="pv-start-search-line"></div>
        </div>
        <div class="pv-start-grid">
          <div class="pv-start-tile"><div class="pv-start-tile-puck" style="background:#0ea5e9"></div><div class="pv-start-tile-label"></div></div>
          <div class="pv-start-tile"><div class="pv-start-tile-puck" style="background:#f59e0b"></div><div class="pv-start-tile-label"></div></div>
          <div class="pv-start-tile"><div class="pv-start-tile-puck" style="background:#a855f7"></div><div class="pv-start-tile-label"></div></div>
          <div class="pv-start-tile"><div class="pv-start-tile-puck" style="background:${accent}"></div><div class="pv-start-tile-label"></div></div>
        </div>
        <div class="pv-start-list">
          ${[ '#4f46e5','#0ea5e9','#10b981' ].map(c => `
            <div class="pv-start-list-row">
              <div class="pv-start-list-icon" style="background:${c}"></div>
              <div class="pv-start-list-text"></div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  function previewLauncher(accent) {
    return `
      <div class="pv-launcher" style="background:${withAlpha(accent, 0.08)}">
        <div class="pv-launcher-nav">
          ${[0,1,2,3,4,5].map(i => `<div class="pv-launcher-nav-row ${i===1?'active':''}"></div>`).join('')}
        </div>
        <div class="pv-launcher-main">
          <div class="pv-launcher-card">
            <div class="pv-launcher-card-icon" style="background:${accent};border-radius:50%"></div>
            <div class="pv-launcher-card-bars">
              <div class="pv-launcher-card-bar" style="background:${accent};width:60%;opacity:.8"></div>
              <div class="pv-launcher-card-bar" style="background:#d4d4d8;width:35%"></div>
            </div>
          </div>
          <div class="pv-launcher-card">
            <div class="pv-launcher-card-bars" style="gap:3px;">
              <div class="pv-launcher-card-bar" style="background:#d4d4d8;width:80%"></div>
              <div class="pv-launcher-card-bar" style="background:#e4e4e7;width:55%"></div>
              <div class="pv-launcher-card-bar" style="background:#e4e4e7;width:70%"></div>
            </div>
          </div>
          <div class="pv-launcher-card">
            <div class="pv-launcher-card-icon" style="background:${withAlpha(accent,0.5)}"></div>
            <div class="pv-launcher-card-bars">
              <div class="pv-launcher-card-bar" style="background:#d4d4d8;width:50%"></div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function previewFor(kind, accent, idx) {
    switch (kind) {
      case 'AppWindow': return previewAppWindow(accent, idx);
      case 'Store':     return previewStore(accent);
      case 'Start':     return previewStart(accent);
      case 'Launcher':  return previewLauncher(accent);
      default:          return `<div style="width:100%;height:100%;background:${withAlpha(accent,0.1)}"></div>`;
    }
  }

  function previewReal(dataUrl) {
    // Real window screenshot. object-fit:cover crops to the card's
    // aspect ratio so we see the top-left of the page (Safari Tab
    // Overview convention — page header stays visible).
    return `<div class="pv-real"><img src="${dataUrl}" alt=""></div>`;
  }

  function makeCard(entry, isActive, idx) {
    const accent = accentFor(entry.title);
    // Prefer the real screenshot when the host was able to capture
    // one. Fall back to the CSS-only kind-specific mock otherwise
    // (e.g. screencapture refused for permission reasons).
    const preview = entry.previewDataUrl
      ? previewReal(entry.previewDataUrl)
      : previewFor(entry.kind, accent, idx);
    return `
      <div class="card ${isActive ? 'active' : ''}" data-window-id="${entry.windowId}" data-title="${escapeHtml(entry.title.toLowerCase())}" data-subtitle="${escapeHtml(entry.subtitle.toLowerCase())}">
        <div class="card-head">
          <div class="card-icon" style="background:${accent}">${glyphOrLetter(entry)}</div>
          <div class="card-title">${escapeHtml(entry.title)}</div>
        </div>
        <div class="card-preview">${preview}</div>
        <div class="card-foot">${escapeHtml(entry.subtitle)}</div>
      </div>`;
  }

  function makeNewWindowCard() {
    return `
      <div class="card new-window" id="new-window-card">
        <div class="new-window-puck">+</div>
        <div class="new-window-label">新しいウィンドウ</div>
        <div class="new-window-sub">スタートページを開く</div>
      </div>`;
  }

  function makeDockTile(entry) {
    const accent = accentFor(entry.title);
    return `<div class="dock-tile" style="background:linear-gradient(135deg, ${accent} 0%, ${withAlpha(accent, 0.8)} 100%)" data-window-id="${entry.windowId}">${glyphOrLetter(entry)}</div>`;
  }

  // Render
  (function render() {
    const cardsEl = document.getElementById('cards');
    WINDOWS.forEach((w, i) => cardsEl.insertAdjacentHTML('beforeend', makeCard(w, i === 0, i)));
    cardsEl.insertAdjacentHTML('beforeend', makeNewWindowCard());

    const dockEl = document.getElementById('dock');
    WINDOWS.forEach((w) => dockEl.insertAdjacentHTML('beforeend', makeDockTile(w)));
    dockEl.insertAdjacentHTML('beforeend', '<div class="dock-tile plus" id="dock-plus">+</div>');

    const subEl = document.getElementById('subtitle');
    subEl.textContent = WINDOWS.length === 0
      ? 'まだウィンドウはありません — 新しいウィンドウから始めましょう。'
      : `現在のセッションにある ${WINDOWS.length} つのアプリと、操作中のものを切り替えます。`;
  })();

  // Handlers
  document.addEventListener('click', (e) => {
    const tile = e.target.closest('[data-window-id]');
    if (tile) {
      e.stopPropagation();
      BRIDGE({ action: 'ActivateWindow', windowId: Number(tile.getAttribute('data-window-id')) });
      return;
    }
    if (e.target.closest('#new-window-card') || e.target.closest('#dock-plus')) {
      e.stopPropagation();
      BRIDGE({ action: 'OpenStartWindow' });
      return;
    }
    if (e.target.closest('.card') || e.target.closest('.dock') || e.target.closest('.header')) {
      return;
    }
    BRIDGE({ action: 'CloseSwitcher' });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') BRIDGE({ action: 'CloseSwitcher' });
  });

  // Safari-style live filter: typing in the search box hides cards
  // whose title/subtitle doesn't contain the query (case-insensitive).
  // The new-window CTA tile is always visible.
  const filterEl = document.getElementById('filter');
  if (filterEl) {
    filterEl.addEventListener('input', () => {
      const q = filterEl.value.trim().toLowerCase();
      document.querySelectorAll('.card[data-window-id]').forEach((c) => {
        const t = c.getAttribute('data-title') || '';
        const s = c.getAttribute('data-subtitle') || '';
        const match = q === '' || t.includes(q) || s.includes(q);
        c.classList.toggle('hidden', !match);
      });
    });
    // Pressing Enter on the search box activates the first visible
    // card — same UX as Safari Tab Overview's keyboard nav.
    filterEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const first = document.querySelector('.card[data-window-id]:not(.hidden)');
        if (first) {
          BRIDGE({ action: 'ActivateWindow', windowId: Number(first.getAttribute('data-window-id')) });
        }
      }
    });
  }
</script>

</body>
</html>
