<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>起動前にご確認ください</title>
<style>
  :root {
    --bg-base:   #f7f4ff;
    --card:      #ffffff;
    --border:    #ececf1;
    --border-soft: #f4f4f7;
    --text:      #1a1a1f;
    --muted:     #6b6b78;
    --soft:      #a3a3b0;
    --accent:    #6366f1;
    --accent-bg: #eef2ff;
    --ok:        #22c55e;
    --ok-bg:     #f0fdf4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--card);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }

  .frame {
    width: 100%; height: 100%;
    padding: 32px 28px 20px;
    background: var(--card);
    display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
  }

  /* HEADER */
  .header { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shield {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 22px rgba(99, 102, 241, 0.32);
  }
  .shield svg { width: 24px; height: 24px; }
  .header h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .header p  { margin: 0; font-size: 12.5px; color: var(--muted); text-align: center; }

  /* LOADING */
  .loading-state {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 24px 0;
    color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTIONS */
  .section { display: flex; flex-direction: column; gap: 8px; }
  .section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: var(--muted);
  }
  .section-title svg { width: 13px; height: 13px; color: var(--accent); }

  /* IDENTITY LIST */
  .id-list {
    background: var(--border-soft);
    border-radius: 10px;
    padding: 4px 0;
  }
  .id-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px;
    font-size: 12.5px;
  }
  .id-key   { color: var(--muted); width: 130px; flex-shrink: 0; }
  .id-value { color: var(--text); font-weight: 500; flex: 1;
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* CONFIG FIELDS */
  .fields { display: flex; flex-direction: column; gap: 6px; }
  .field-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .field-key {
    width: 130px; flex-shrink: 0;
    font-size: 11.5px; font-weight: 600; color: var(--muted);
    font-family: "SF Mono", ui-monospace, monospace;
  }
  .field-row input, .field-row select {
    flex: 1; border: 0; outline: 0; background: transparent;
    font: inherit; font-size: 12px; color: var(--text);
    font-family: "SF Mono", ui-monospace, monospace;
  }
  .field-row input::placeholder { color: var(--soft); }
  .badge-configured {
    font-size: 11px; font-weight: 600;
    color: var(--ok);
    background: var(--ok-bg);
    border-radius: 6px;
    padding: 2px 8px;
  }

  /* CONSENT ITEMS */
  .consent-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--border-soft);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12.5px;
  }
  .consent-item input[type=checkbox] { margin-top: 2px; accent-color: var(--accent); }
  .consent-text { flex: 1; }
  .consent-summary { color: var(--text); font-weight: 500; }
  .consent-meta { color: var(--soft); font-size: 11px; margin-top: 2px;
                  font-family: "SF Mono", ui-monospace, monospace; }

  /* BUTTONS */
  .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .btn {
    height: 36px; padding: 0 18px;
    border: 0; cursor: pointer;
    font-size: 13px; font-weight: 600;
    border-radius: 10px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn.cancel {
    background: var(--border-soft);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.cancel:hover { background: #ececf1; }
  .btn.approve {
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
    color: #fff;
    box-shadow: 0 6px 14px rgba(99,102,241,0.30);
  }
  .btn.approve:hover:not(:disabled) { filter: brightness(1.05); }
  .btn.approve:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="frame">
  <!-- HEADER -->
  <div class="header">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <h1>起動前にご確認ください</h1>
    <p id="header-sub">カプセル名と権限を確認の上、起動してください。</p>
  </div>

  <!-- LOADING STATE (visible until preview arrives) -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <span>カプセルを検証中...</span>
  </div>

  <!-- READY STATE (hidden until hydration) -->
  <div id="ready-state" style="display:none">

    <!-- PREFLIGHT ERROR (shown when preflight_failed === true) -->
    <div id="preflight-error" class="section" style="display:none">
      <div class="id-list" style="padding:12px 14px;">
        <span style="font-size:13px;color:#e05252;">⚠ カプセルの検証に失敗しました</span>
        <p style="margin:8px 0 0;font-size:12px;color:var(--muted);">
          起動情報を取得できませんでした。キャンセルして再度お試しください。
        </p>
      </div>
    </div>

    <!-- IDENTITY -->
    <div class="section" id="identity-section">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span>起動情報の確認</span>
      </div>
      <div class="id-list" id="identity-list">
        <!-- populated by renderPreview() -->
      </div>
    </div>

    <!-- REQUIREMENTS (secrets + consents injected here) -->
    <div id="requirements-root"></div>

  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn cancel" id="cancel">キャンセル</button>
    <button class="btn approve" id="approve" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span>承認して起動</span>
    </button>
  </div>
</div>

<script>
  const POST = (window.ipc && window.ipc.postMessage)
    ? (m) => window.ipc.postMessage(JSON.stringify(m))
    : (m) => console.log('[no bridge]', m);
  const BRIDGE = (command) => POST({ capsule: 'ato-launch', command });

  let _preview = null;

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.textContent; // for textContent assignment; just returns the string safely
  }

  function addRow(list, key, value) {
    const row = document.createElement('div');
    row.className = 'id-row';
    const k = document.createElement('span');
    k.className = 'id-key';
    k.textContent = key;
    const v = document.createElement('span');
    v.className = 'id-value';
    v.textContent = value;
    row.appendChild(k);
    row.appendChild(v);
    list.appendChild(row);
  }

  function renderPreview(p) {
    _preview = p;

    // Header subtitle
    const sub = document.getElementById('header-sub');
    sub.textContent = p.name + ' の起動前に内容をご確認ください。';

    // Show ready state, hide loading spinner
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('ready-state').style.display = '';

    if (p.preflight_failed) {
      // Show error, hide identity/requirements
      document.getElementById('preflight-error').style.display = '';
      document.getElementById('identity-section').style.display = 'none';
      document.getElementById('requirements-root').innerHTML = '';
      checkApproveEnabled();
      return;
    }

    // Hide error, show identity
    document.getElementById('preflight-error').style.display = 'none';
    document.getElementById('identity-section').style.display = '';

    // Identity section
    const idList = document.getElementById('identity-list');
    idList.innerHTML = '';
    addRow(idList, 'アプリケーション', p.name || '(不明)');
    addRow(idList, 'ハンドル', p.handle || '(不明)');
    if (p.capsule_id) addRow(idList, 'Capsule ID', p.capsule_id);
    if (p.capsule_version) addRow(idList, 'バージョン', p.capsule_version);
    if (p.visited_targets && p.visited_targets.length > 0) {
      addRow(idList, 'ターゲット', p.visited_targets.join(', '));
    }

    // Requirements
    const reqRoot = document.getElementById('requirements-root');
    reqRoot.innerHTML = '';

    (p.requirements || []).forEach((req, reqIdx) => {
      if (req.type === 'secrets_required') {
        const section = document.createElement('div');
        section.className = 'section';

        const title = document.createElement('div');
        title.className = 'section-title';
        title.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
        const titleText = document.createElement('span');
        titleText.textContent = req.target ? ('環境変数 (' + req.target + ')') : '環境変数の設定';
        title.appendChild(titleText);
        section.appendChild(title);

        const fields = document.createElement('div');
        fields.className = 'fields';

        (req.fields || []).forEach(f => {
          const row = document.createElement('div');
          row.className = 'field-row';

          const keyEl = document.createElement('span');
          keyEl.className = 'field-key';
          keyEl.textContent = f.label || f.name;

          row.appendChild(keyEl);

          if (f.already_configured) {
            const badge = document.createElement('span');
            badge.className = 'badge-configured';
            badge.textContent = '設定済み';
            row.appendChild(badge);
          } else if (f.kind === 'enum' && f.choices && f.choices.length > 0) {
            const sel = document.createElement('select');
            sel.dataset.key = f.name;
            sel.dataset.kind = f.kind;
            if (f.choices.includes('')) sel.required = true;
            f.choices.forEach(c => {
              const opt = document.createElement('option');
              opt.value = c;
              opt.textContent = c;
              sel.appendChild(opt);
            });
            row.appendChild(sel);
          } else {
            const inp = document.createElement('input');
            inp.type = (f.kind === 'secret') ? 'password' : 'text';
            inp.dataset.key = f.name;
            inp.dataset.kind = f.kind;
            inp.placeholder = f.placeholder || (f.kind === 'secret' ? '••••••••' : '');
            inp.addEventListener('input', updateApproveState);
            row.appendChild(inp);
          }

          fields.appendChild(row);
        });

        section.appendChild(fields);
        reqRoot.appendChild(section);

      } else if (req.type === 'consent_required') {
        const section = document.createElement('div');
        section.className = 'section';

        const title = document.createElement('div');
        title.className = 'section-title';
        title.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/></svg>';
        const titleText = document.createElement('span');
        titleText.textContent = '実行ポリシーの同意';
        title.appendChild(titleText);
        section.appendChild(title);

        const item = document.createElement('div');
        item.className = 'consent-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.dataset.consent = JSON.stringify({
          scoped_id: req.scoped_id,
          version: req.version,
          target_label: req.target_label,
          policy_segment_hash: req.policy_segment_hash,
          provisioning_policy_hash: req.provisioning_policy_hash,
        });
        cb.addEventListener('change', updateApproveState);

        const text = document.createElement('div');
        text.className = 'consent-text';
        const summary = document.createElement('div');
        summary.className = 'consent-summary';
        summary.textContent = req.summary || req.scoped_id;
        const meta = document.createElement('div');
        meta.className = 'consent-meta';
        meta.textContent = req.scoped_id + '@' + req.version;
        text.appendChild(summary);
        text.appendChild(meta);

        item.appendChild(cb);
        item.appendChild(text);
        section.appendChild(item);
        reqRoot.appendChild(section);
      }
    });

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('ready-state').style.display = '';
    updateApproveState();
  }

  function updateApproveState() {
    const btn = document.getElementById('approve');
    if (!_preview || _preview.loading || _preview.preflight_failed) { btn.disabled = true; return; }

    // Check that all non-configured required secret/string fields have a value.
    let allFilled = true;
    document.querySelectorAll('[data-key]').forEach(el => {
      if (el.tagName === 'INPUT' && el.dataset.kind === 'secret' && !el.value.trim()) {
        allFilled = false;
      }
    });

    // Check that all consent checkboxes are checked.
    let allConsented = true;
    document.querySelectorAll('input[type=checkbox][data-consent]').forEach(cb => {
      if (!cb.checked) allConsented = false;
    });

    btn.disabled = !(allFilled && allConsented);
  }

  // Called by the Rust side after background preflight completes.
  // Receives a JS object (JSON value, not string).
  window.__ato_hydrate_preview = function(previewObj) {
    renderPreview(previewObj);
  };

  // Check if init script already injected a ready preview.
  document.addEventListener('DOMContentLoaded', () => {
    const p = window.__ATO_LAUNCH_PREVIEW;
    if (p && !p.loading) {
      renderPreview(p);
    }
    // If loading=true, the Rust background task will call __ato_hydrate_preview.
  });

  document.getElementById('approve').addEventListener('click', () => {
    if (!_preview || _preview.loading) return;
    const secrets = {};
    const config = {};
    const consents = [];

    document.querySelectorAll('[data-key]').forEach(el => {
      const v = el.value; // do NOT trim secrets; trim non-secrets
      if (el.dataset.kind === 'secret') {
        if (v.length > 0) secrets[el.dataset.key] = v;
      } else {
        if (v.trim().length > 0) config[el.dataset.key] = v.trim();
      }
    });

    document.querySelectorAll('input[type=checkbox][data-consent]:checked').forEach(cb => {
      try { consents.push(JSON.parse(cb.dataset.consent)); } catch (_) {}
    });

    BRIDGE({ kind: 'approve', preview_id: _preview.preview_id, secrets, config, consents });
  });

  document.getElementById('cancel').addEventListener('click', () => {
    BRIDGE({ kind: 'cancel' });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') BRIDGE({ kind: 'cancel' });
  });
</script>

</body>
</html>
