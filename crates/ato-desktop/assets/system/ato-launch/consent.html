<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>起動前にご確認ください</title>
<style>
  :root {
    --bg-base:   #f7f4ff;
    --card:      #ffffff;
    --border:    #ececf1;
    --border-soft: #f4f4f7;
    --text:      #1a1a1f;
    --muted:     #6b6b78;
    --soft:      #a3a3b0;
    --accent:    #6366f1;
    --accent-bg: #eef2ff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(720px 380px at 88% 6%,  #e8e1ff 0%, transparent 60%),
      radial-gradient(640px 360px at 10% 95%, #f3edff 0%, transparent 65%),
      var(--bg-base);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }

  .frame {
    width: min(560px, 100%);
    padding: 24px 28px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 22px 50px rgba(28, 25, 65, 0.16);
    display: flex; flex-direction: column; gap: 18px;
  }

  /* HEADER */
  .header { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shield {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 22px rgba(99, 102, 241, 0.32);
  }
  .shield svg { width: 24px; height: 24px; }
  .header h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .header p  { margin: 0; font-size: 12.5px; color: var(--muted); text-align: center; }

  /* SECTIONS */
  .section { display: flex; flex-direction: column; gap: 8px; }
  .section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: var(--muted);
  }
  .section-title svg { width: 13px; height: 13px; color: var(--accent); }

  /* IDENTITY LIST */
  .id-list {
    background: var(--border-soft);
    border-radius: 10px;
    padding: 4px 0;
  }
  .id-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px;
    font-size: 12.5px;
  }
  .id-key   { color: var(--muted); width: 130px; flex-shrink: 0; }
  .id-value { color: var(--text); font-weight: 500; flex: 1;
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ENV VARS */
  .env { display: flex; flex-direction: column; gap: 6px; }
  .env-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .env-key {
    width: 130px; flex-shrink: 0;
    font-size: 11.5px; font-weight: 600; color: var(--muted);
    font-family: "SF Mono", ui-monospace, monospace;
  }
  .env-row input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font: inherit; font-size: 12px; color: var(--text);
    font-family: "SF Mono", ui-monospace, monospace;
  }
  .env-row input::placeholder { color: var(--soft); }

  /* BUTTONS */
  .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .btn {
    height: 36px; padding: 0 18px;
    border: 0; cursor: pointer;
    font-size: 13px; font-weight: 600;
    border-radius: 10px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn.cancel {
    background: var(--border-soft);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.cancel:hover { background: #ececf1; }
  .btn.approve {
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
    color: #fff;
    box-shadow: 0 6px 14px rgba(99,102,241,0.30);
  }
  .btn.approve:hover { filter: brightness(1.05); }
  .btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="frame">
  <!-- HEADER -->
  <div class="header">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <h1>起動前にご確認ください</h1>
    <p>カプセル名と権限を確認の上、起動してください。</p>
  </div>

  <!-- IDENTITY LIST -->
  <div class="section">
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>起動情報の確認</span>
    </div>
    <div class="id-list">
      <div class="id-row">
        <span class="id-key">アプリケーション</span>
        <span class="id-value" id="app-name">WasedaP2P</span>
      </div>
      <div class="id-row">
        <span class="id-key">要求された権限</span>
        <span class="id-value" id="app-handle">ato.app/shell://wasedap2p</span>
      </div>
      <div class="id-row">
        <span class="id-key">信頼済みの発行元</span>
        <span class="id-value">Ato Labs (検証済み)</span>
      </div>
      <div class="id-row">
        <span class="id-key">使用可能な権限</span>
        <span class="id-value">PostgreSQL / fs (RO) / Redis (Cache)</span>
      </div>
    </div>
  </div>

  <!-- ENV VARS -->
  <div class="section">
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span>環境変数の確認</span>
    </div>
    <div class="env">
      <div class="env-row">
        <span class="env-key">PG_PASSWORD</span>
        <input type="password" data-key="PG_PASSWORD" placeholder="••••••••">
      </div>
      <div class="env-row">
        <span class="env-key">SECRET_KEY</span>
        <input type="password" data-key="SECRET_KEY" placeholder="••••••••">
      </div>
      <div class="env-row">
        <span class="env-key">DATABASE_URL</span>
        <input type="text" data-key="DATABASE_URL"
               value="postgresql://localhost/wasedap2p">
      </div>
      <div class="env-row">
        <span class="env-key">APP_ENV</span>
        <input type="text" data-key="APP_ENV" value="production">
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn cancel" id="cancel">キャンセル</button>
    <button class="btn approve" id="approve">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span>承認して起動</span>
    </button>
  </div>
</div>

<script>
  // System-capsule IPC envelope (broker validates via the
  // ato-launch manifest allowlist).
  const POST = (window.ipc && window.ipc.postMessage)
    ? (m) => window.ipc.postMessage(JSON.stringify(m))
    : (m) => console.log('[no bridge]', m);
  const BRIDGE = (command) => POST({ capsule: 'ato-launch', command });

  // The host injects __ATO_LAUNCH = { name, handle, url } via
  // with_initialization_script before document load. When the wizard
  // is opened via NavigateToUrl(capsule://...), this carries the real
  // target. When opened standalone via MCP (AODD), __ATO_LAUNCH is
  // undefined and we keep the demo identity already in the HTML.
  const launch = (window.__ATO_LAUNCH && typeof window.__ATO_LAUNCH === 'object')
    ? window.__ATO_LAUNCH : null;
  if (launch) {
    if (launch.name)   document.getElementById('app-name').textContent = launch.name;
    if (launch.handle) document.getElementById('app-handle').textContent = launch.handle;
  }
  const HANDLE = document.getElementById('app-handle').textContent.trim();

  document.getElementById('approve').addEventListener('click', () => {
    // Phase 1 does NOT actually start the capsule; the broker logs
    // the approve and closes the window. Phase 2 spawns the
    // AppWindow + drives the boot wizard with real progress.
    BRIDGE({ kind: 'approve', handle: HANDLE });
  });
  document.getElementById('cancel').addEventListener('click', () => {
    BRIDGE({ kind: 'cancel' });
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') BRIDGE({ kind: 'cancel' });
  });
</script>

</body>
</html>
