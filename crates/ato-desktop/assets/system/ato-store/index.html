<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ストア — カプセルレジストリ</title>
<style>
/* ── Design tokens (aligned with ato-web global.css) ── */
:root {
  --bg:            #ffffff;
  --bg-card:       #ffffff;
  --bg-elevated:   #f8fafc;
  --fg:            #0f172a;
  --fg-secondary:  #475569;
  --fg-tertiary:   #94a3b8;
  --accent:        #2563eb;
  --accent-soft:   #eff6ff;
  --accent-strong: #1d4ed8;
  --border:        #e2e8f0;
  --border-subtle: #f1f5f9;
  --success:       #10b981;
  --warning:       #f59e0b;
  --shadow-sm:     0 1px 2px rgba(0,0,0,0.05);
  --shadow-card:   0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --radius:        12px;
  --radius-lg:     16px;
  --radius-md:     8px;
  --radius-sm:     4px;
  /* capsule type colors */
  --type-webpage:  #3b82f6;
  --type-app:      #8b5cf6;
  --type-webapp:   #10b981;
  --type-cli:      #f59e0b;
  --type-agent:    #06b6d4;
  --drag-h:        28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Drag region ── */
#drag-region {
  height: var(--drag-h);
  -webkit-app-region: drag;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  -webkit-app-region: drag;
}
.logo {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--fg);
  -webkit-app-region: no-drag;
  white-space: nowrap;
}
.logo span { color: var(--accent); }
.search-wrap {
  flex: 1;
  max-width: 480px;
  position: relative;
  -webkit-app-region: no-drag;
}
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--fg-tertiary); pointer-events: none;
  display: flex; align-items: center;
}
.search-input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 13px;
  font-family: inherit;
  background: var(--bg-elevated);
  color: var(--fg);
  outline: none;
  -webkit-user-select: text;
  user-select: text;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--fg-tertiary); }
.search-input:focus { border-color: var(--accent); background: var(--bg-card); }

.topbar-actions {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto; -webkit-app-region: no-drag;
}
.view-btn {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: transparent; color: var(--fg-secondary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.view-btn:hover, .view-btn.active {
  background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
}
.web-link {
  font-size: 12px; color: var(--fg-secondary);
  text-decoration: none; white-space: nowrap;
  padding: 5px 8px; border-radius: var(--radius-sm);
  transition: color 0.1s;
}
.web-link:hover { color: var(--accent); }

/* ── Result count ── */
.result-meta {
  padding: 6px 20px 0;
  font-size: 12px; color: var(--fg-secondary);
  flex-shrink: 0;
}
.result-meta strong { color: var(--fg); }

/* ── Body layout ── */
.body {
  flex: 1; display: flex; overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-card);
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 20px;
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }
.sidebar-section { display: flex; flex-direction: column; gap: 4px; }
.sidebar-heading {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--fg-tertiary); padding: 2px 6px; margin-bottom: 4px;
}
.filter-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius-sm);
  border: none; background: transparent; cursor: pointer;
  font-size: 12.5px; font-family: inherit; color: var(--fg-secondary);
  text-align: left; width: 100%; transition: background 0.1s, color 0.1s;
}
.filter-btn:hover { background: var(--bg-elevated); color: var(--fg); }
.filter-btn.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.filter-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.filter-count {
  margin-left: auto; font-size: 11px; color: var(--fg-tertiary);
}
.tag-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.tag-chip {
  padding: 3px 8px; border-radius: 5px;
  font-size: 11px; background: var(--bg-elevated);
  color: var(--fg-secondary); cursor: pointer; border: none; font-family: inherit;
  transition: background 0.1s, color 0.1s;
}
.tag-chip:hover { background: var(--accent-soft); color: var(--accent); }

/* ── Main content ── */
.main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 16px 20px 32px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Grid ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
/* ── List ── */
.cards-list {
  display: flex; flex-direction: column; gap: 8px;
}

/* ── App card — grid mode ── */
.app-card-grid {
  display: flex; flex-direction: column;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--bg-card);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
  text-decoration: none; color: inherit;
}
.app-card-grid:hover {
  box-shadow: var(--shadow-card);
  border-color: var(--fg-tertiary);
  transform: translateY(-2px);
}
.card-preview {
  position: relative; aspect-ratio: 16/9; overflow: hidden;
  background: var(--bg-elevated);
}
.card-preview-bg {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end; padding: 10px;
}
.card-preview-grid-overlay {
  position: absolute; inset: 0; opacity: 0.1;
  background-image:
    linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 24px 24px;
}
.card-app-icon {
  position: absolute; bottom: 10px; left: 10px;
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--bg-card); border: 1.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; overflow: hidden;
}
.card-app-icon img { width: 26px; height: 26px; object-fit: contain; }
.card-type-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 2px 6px; border-radius: 4px;
  backdrop-filter: blur(4px);
}
.card-body { display: flex; flex-direction: column; flex: 1; padding: 12px; }
.card-title {
  font-size: 13px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--fg); margin-bottom: 2px;
  transition: color 0.1s;
}
.app-card-grid:hover .card-title { color: var(--accent); }
.card-desc {
  font-size: 11px; color: var(--fg-tertiary); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 10px; flex: 1;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.card-stats {
  display: flex; align-items: center; gap: 6px; min-width: 0;
}
.stat {
  display: flex; align-items: center; gap: 2px;
  font-size: 11px; color: var(--fg-tertiary);
}
.stat svg { flex-shrink: 0; }
.stat-pub {
  font-size: 11px; color: var(--fg-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 80px;
}
.btn-install-soft {
  padding: 5px 11px; border-radius: var(--radius-md);
  background: var(--accent-soft); color: var(--accent);
  border: none; font-size: 11.5px; font-weight: 700;
  font-family: inherit; cursor: pointer; flex-shrink: 0;
  transition: background 0.12s, color 0.12s;
}
.btn-install-soft:hover { background: var(--accent); color: #fff; }

/* ── App card — list mode ── */
.app-card-list {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: var(--radius-lg);
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
  text-decoration: none; color: inherit;
}
.app-card-list:hover {
  background: var(--bg-elevated); border-color: var(--fg-tertiary);
  box-shadow: var(--shadow-sm);
}
.list-icon {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  background: var(--bg-elevated); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; overflow: hidden;
  transition: transform 0.15s;
}
.app-card-list:hover .list-icon { transform: scale(1.05); }
.list-info { flex: 1; min-width: 0; }
.list-title {
  font-size: 13px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--fg); transition: color 0.1s;
}
.app-card-list:hover .list-title { color: var(--accent); }
.list-desc {
  font-size: 11px; color: var(--fg-tertiary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.list-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.list-pub { font-size: 11px; color: var(--fg-secondary); }

/* ── States ── */
.state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; padding: 60px 0;
  color: var(--fg-secondary); font-size: 13px; text-align: center;
}
.state-icon { font-size: 36px; margin-bottom: 4px; }
.state a { color: var(--accent); text-decoration: none; cursor: pointer; }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Section heading */
.section-heading {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--fg-tertiary); margin-bottom: 12px;
}
</style>
</head>
<body>

<div id="drag-region"></div>

<header class="topbar">
  <div class="logo">sto<span>re</span></div>
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9.2 9.2L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </span>
    <input class="search-input" type="search" id="search"
           data-i18n-placeholder="store.search.placeholder"
           placeholder="カプセルを検索…" autocomplete="off" spellcheck="false">
  </div>
  <div class="topbar-actions">
    <button class="view-btn active" id="btnGrid" data-i18n-title="store.view.grid" title="グリッド表示" onclick="setView('grid')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1" y="1" width="4.5" height="4.5" rx="1" fill="currentColor"/>
        <rect x="7.5" y="1" width="4.5" height="4.5" rx="1" fill="currentColor"/>
        <rect x="1" y="7.5" width="4.5" height="4.5" rx="1" fill="currentColor"/>
        <rect x="7.5" y="7.5" width="4.5" height="4.5" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <button class="view-btn" id="btnList" data-i18n-title="store.view.list" title="リスト表示" onclick="setView('list')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1" y="2.5" width="11" height="2" rx="1" fill="currentColor"/>
        <rect x="1" y="5.5" width="11" height="2" rx="1" fill="currentColor"/>
        <rect x="1" y="8.5" width="11" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <a class="web-link" href="#" data-i18n="store.view_on_ato" onclick="openWeb();return false;">ato.run で見る ↗</a>
  </div>
</header>

<div class="result-meta" id="resultMeta"></div>

<div class="body">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading" data-i18n="store.filter.type">タイプ</div>
      <button class="filter-btn active" data-type="all" onclick="setType('all')">
        <span style="font-size:13px">🗂</span>
        <span data-i18n="store.filter.all">すべて</span>
        <span class="filter-count" id="countAll">–</span>
      </button>
      <button class="filter-btn" data-type="app" onclick="setType('app')">
        <span class="filter-dot" style="background:var(--type-app)"></span>
        App
      </button>
      <button class="filter-btn" data-type="webpage" onclick="setType('webpage')">
        <span class="filter-dot" style="background:var(--type-webpage)"></span>
        Webpage
      </button>
      <button class="filter-btn" data-type="webapp" onclick="setType('webapp')">
        <span class="filter-dot" style="background:var(--type-webapp)"></span>
        Web App
      </button>
      <button class="filter-btn" data-type="cli" onclick="setType('cli')">
        <span class="filter-dot" style="background:var(--type-cli)"></span>
        CLI
      </button>
      <button class="filter-btn" data-type="agent" onclick="setType('agent')">
        <span class="filter-dot" style="background:var(--type-agent)"></span>
        Agent Skills
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-heading" data-i18n="store.filter.tag">タグ</div>
      <div class="tag-chips">
        <button class="tag-chip" onclick="appendTag('RAG')">#RAG</button>
        <button class="tag-chip" onclick="appendTag('LLM')">#LLM</button>
        <button class="tag-chip" onclick="appendTag('automation')">#Automation</button>
        <button class="tag-chip" onclick="appendTag('voice')">#Voice</button>
        <button class="tag-chip" onclick="appendTag('image')">#ImageGen</button>
        <button class="tag-chip" onclick="appendTag('testing')">#Testing</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="state">
      <div class="spinner"></div>
      <span data-i18n="store.loading">カプセルカタログを読み込み中…</span>
    </div>
  </main>
</div>

<script>
'use strict';

// ── IPC ─────────────────────────────────────────────────────────────────────
const POST = (window.ipc && typeof window.ipc.postMessage === 'function')
  ? (m) => window.ipc.postMessage(JSON.stringify(m))
  : null;

function openWeb() {
  POST && POST({ capsule: 'ato-store', command: { kind: 'browse_url', url: 'https://ato.run/search' } });
}
function openCapsule(handle) {
  POST && POST({ capsule: 'ato-store', command: { kind: 'open_capsule', handle } });
}

// ── State ────────────────────────────────────────────────────────────────────
let allCapsules = [];
let viewMode = 'grid';   // 'grid' | 'list'
let selectedType = 'all';
let searchQuery = '';

// ── Category gradients (mirrors ato-web AppCard.tsx) ─────────────────────────
const CATEGORY_GRADIENTS = {
  ai:           ['#1e1b4b', '#2d1b69'],
  design:       ['#1a1040', '#2e1065'],
  'dev-tools':  ['#0f2027', '#203a43'],
  databases:    ['#0f172a', '#1e3a5f'],
  productivity: ['#1c0f00', '#3b1f00'],
  utilities:    ['#0d1f12', '#1a3a22'],
  education:    ['#1a0f2e', '#2d1b3d'],
};
function getCategoryGradient(type) {
  const g = CATEGORY_GRADIENTS[type];
  return g ? `${g[0]}, ${g[1]}` : '#111827, #1f2937';
}

// ── Type color ───────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  webpage: '#3b82f6', app: '#8b5cf6', webapp: '#10b981', cli: '#f59e0b', agent: '#06b6d4',
};
const TYPE_LABELS = {
  webpage: 'Webpage', app: 'App', webapp: 'Web App', cli: 'CLI', agent: 'Agent',
};

// ── Icon helper ──────────────────────────────────────────────────────────────
function capsuleIcon(tags, type) {
  if (type === 'agent') return '🤖';
  if (type === 'cli')   return '💻';
  if (type === 'webapp') return '🌐';
  if (!tags) return '📦';
  if (tags.includes('web'))   return '🌐';
  if (tags.includes('ai'))    return '🤖';
  if (tags.includes('tool'))  return '🛠';
  if (tags.includes('game'))  return '🎮';
  return '📦';
}

// ── Format ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n) return '0';
  if (n >= 1000) return `${(n / 1000).toFixed(n >= 10000 ? 0 : 1)}k`;
  return String(n);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render card (grid) ───────────────────────────────────────────────────────
function renderCardGrid(c) {
  const handle = c.handle || c.scopedId || c.id || '';
  const name   = c.name || handle.split('/').pop() || handle;
  const desc   = c.description || '';
  const tags   = Array.isArray(c.tags) ? c.tags : [];
  const type   = c.type || 'app';
  const icon   = capsuleIcon(tags, type);
  const downloads = c.downloads || 0;
  const publisher = c.publisher?.displayName || c.publisher?.handle || c.author || '';
  const typeColor = TYPE_COLORS[type] || '#94a3b8';
  const typeLabel = TYPE_LABELS[type] || type;
  const gradColors = getCategoryGradient(c.category || type);
  const safeH = handle.replace(/"/g,'&quot;');

  return `<div class="app-card-grid" onclick="openCapsule('${safeH}')" role="button" tabindex="0">
    <div class="card-preview">
      <div class="card-preview-bg" style="background:linear-gradient(135deg,${gradColors})">
        <div class="card-preview-grid-overlay"></div>
      </div>
      <div class="card-app-icon">${icon}</div>
      <div class="card-type-badge" style="background:${typeColor}22;color:${typeColor};border:1px solid ${typeColor}44">${esc(typeLabel)}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${esc(name)}</div>
      <div class="card-desc">${esc(desc) || '<span style="color:var(--fg-tertiary);font-style:italic">' + (window.__ATO_T__ ? window.__ATO_T__('store.no_description') : '説明なし') + '</span>'}</div>
      <div class="card-footer">
        <div class="card-stats">
          ${publisher ? `<span class="stat-pub">${esc(publisher)}</span>` : ''}
          <span class="stat">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M5 1l1.12 2.27 2.51.37-1.82 1.77.43 2.5L5 6.77 2.76 7.91l.43-2.5L1.37 3.64l2.51-.37z" fill="#f59e0b"/>
            </svg>
            <span>4.7</span>
          </span>
          ${downloads > 0 ? `<span class="stat">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M5 1v6M2 7l3 2.5L8 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            ${fmt(downloads)}
          </span>` : ''}
        </div>
        <button class="btn-install-soft" onclick="event.stopPropagation();openCapsule('${safeH}')">${window.__ATO_T__ ? window.__ATO_T__('store.open') : '開く'}</button>
      </div>
    </div>
  </div>`;
}

// ── Render card (list) ───────────────────────────────────────────────────────
function renderCardList(c) {
  const handle = c.handle || c.scopedId || c.id || '';
  const name   = c.name || handle.split('/').pop() || handle;
  const desc   = c.description || '';
  const tags   = Array.isArray(c.tags) ? c.tags : [];
  const type   = c.type || 'app';
  const icon   = capsuleIcon(tags, type);
  const publisher = c.publisher?.displayName || c.publisher?.handle || c.author || '';
  const typeColor = TYPE_COLORS[type] || '#94a3b8';
  const typeLabel = TYPE_LABELS[type] || type;
  const safeH = handle.replace(/"/g,'&quot;');

  return `<div class="app-card-list" onclick="openCapsule('${safeH}')" role="button" tabindex="0">
    <div class="list-icon">${icon}</div>
    <div class="list-info">
      <div class="list-title">${esc(name)}</div>
      <div class="list-desc">${esc(desc)}</div>
      <div class="list-meta">
        ${publisher ? `<span class="list-pub">${esc(publisher)}</span>` : ''}
        <span style="font-size:9.5px;padding:1px 5px;border-radius:3px;background:${typeColor}18;color:${typeColor}">${esc(typeLabel)}</span>
      </div>
    </div>
    <button class="btn-install-soft" style="padding:5px 13px" onclick="event.stopPropagation();openCapsule('${safeH}')">${window.__ATO_T__ ? window.__ATO_T__('store.open') : '開く'}</button>
  </div>`;
}

// ── Render view ──────────────────────────────────────────────────────────────
function renderView() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = allCapsules.filter(c => {
    // type filter
    if (selectedType !== 'all' && c.type !== selectedType) return false;
    // text search
    if (q) {
      const text = [c.handle||c.scopedId||'', c.name||'', c.description||'']
        .concat(Array.isArray(c.tags) ? c.tags : [])
        .join(' ').toLowerCase();
      return text.includes(q);
    }
    return true;
  });

  const main = document.getElementById('main');
  const meta = document.getElementById('resultMeta');
  const t = window.__ATO_T__;
  const sectionLabel = q
    ? (t ? t('store.search.results').replace('{query}', searchQuery) : `「${searchQuery}」の検索結果`)
    : (t ? t('store.search.all') : 'カプセル一覧');
  meta.innerHTML = `<strong>${filtered.length}</strong> 件 — ${sectionLabel}`;
  document.getElementById('countAll').textContent = allCapsules.length;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="state">
      <div class="state-icon">🔍</div>
      <span>${t ? t('store.empty') : '該当するカプセルはありません'}</span>
      <span><a href="#" onclick="openWeb();return false;">${t ? t('store.search_on_ato') : 'ato.run で検索する ↗'}</a></span>
    </div>`;
    return;
  }

  if (viewMode === 'grid') {
    main.innerHTML = `<div class="cards-grid">${filtered.map(renderCardGrid).join('')}</div>`;
  } else {
    main.innerHTML = `<div class="cards-list">${filtered.map(renderCardList).join('')}</div>`;
  }
  if (window.__ATO_APPLY_I18N__) window.__ATO_APPLY_I18N__();
}

// ── Controls ─────────────────────────────────────────────────────────────────
function setView(mode) {
  viewMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('btnList').classList.toggle('active', mode === 'list');
  renderView();
}

function setType(type) {
  selectedType = type;
  document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  renderView();
}

function appendTag(tag) {
  const inp = document.getElementById('search');
  const current = inp.value.trim();
  inp.value = current ? `${current} ${tag}` : tag;
  searchQuery = inp.value;
  renderView();
  inp.focus();
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderView();
});

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  if (Array.isArray(window.__CAPSULES_DATA__) && window.__CAPSULES_DATA__.length > 0) {
    allCapsules = window.__CAPSULES_DATA__;
    renderView();
    if (window.__ATO_APPLY_I18N__) window.__ATO_APPLY_I18N__();
    return;
  }

  fetch('https://api.ato.run/v1/capsules?limit=60')
    .then(r => r.json())
    .then(data => {
      allCapsules = Array.isArray(data) ? data : (data.capsules || data.items || []);
      renderView();
      if (window.__ATO_APPLY_I18N__) window.__ATO_APPLY_I18N__();
    })
    .catch(() => {
      const t = window.__ATO_T__;
      document.getElementById('main').innerHTML = `
        <div class="state">
          <div class="state-icon">📡</div>
          <span>${t ? t('store.error') : 'カタログを取得できませんでした'}</span>
          <span><a href="#" onclick="openWeb();return false;">${t ? t('store.open_in_browser') : 'ato.run をブラウザで開く ↗'}</a></span>
        </div>`;
      document.getElementById('resultMeta').textContent = '';
    });
}

init();
</script>
</body>
</html>
