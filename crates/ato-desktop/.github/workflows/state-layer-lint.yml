name: State-Layer Purity Lint

# Enforces PAS §6.1 — the state, orchestrator, and CLI-envelope layers
# must remain free of GPUI / Wry / platform-specific imports so the
# headless ato-cli can reuse them when V2.0 introduces HostShell.
#
# Failure means a platform-specific import has leaked into a layer that
# is required to compile cleanly without GUI dependencies. Move the
# offending code into the UI / webview layer and abstract through a
# trait if shared logic is required.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  state-layer-purity:
    name: state-layer-purity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Forbid GPUI / Wry / platform imports in state layer
        # Files that participate in the headless / portable boundary.
        # Keep this list aligned with PAS §6.1 invariant 1.
        run: |
          set -euo pipefail
          paths=(
            src/state/mod.rs
            src/orchestrator.rs
            src/bridge.rs
            src/config.rs
            src/cli_envelope.rs
          )
          forbidden_pattern='^use (gpui|wry|objc2|windows)([:; ]|$)'
          violations=0
          for f in "${paths[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::warning file=$f::lint target missing; skipping"
              continue
            fi
            if grep -nE "$forbidden_pattern" "$f"; then
              echo "::error file=$f::forbidden import — state layer must stay platform-independent (PAS §6.1)"
              violations=$((violations + 1))
            fi
          done
          if [[ "$violations" -gt 0 ]]; then
            echo "found $violations state-layer purity violation(s)" >&2
            exit 1
          fi
