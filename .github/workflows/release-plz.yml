name: Release / Release PR

# release-pr: opens or updates the ato-cli version-bump PR.
# release: tags the merged release commit after main CI is green.
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      command:
        description: 'release-pr: Create/update Release PR | release: Tag after main CI passes'
        required: false
        default: 'release-pr'
        type: choice
        options:
          - release-pr
          - release

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    env:
      RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare previous tag for release-plz package comparison
        shell: bash
        run: |
          .github/scripts/prepare-release-plz-previous-tag.sh

      - name: Validate PAT for release
        if: ${{ github.event.inputs.command == 'release' }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "::error::RELEASE_PLZ_TOKEN secret is required for the release command."
            echo "::error::Without a PAT, the pushed tag will not trigger release.yml."
            exit 1
          fi

      - name: Resolve token for release-pr
        if: ${{ github.event.inputs.command != 'release' }}
        id: release_plz_token
        shell: bash
        run: |
          if [[ -n "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "token=${RELEASE_PLZ_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and release
        if: ${{ github.event.inputs.command == 'release' }}
        uses: release-plz/action@v0.5.128
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Create or update release PR
        if: ${{ github.event.inputs.command != 'release' }}
        uses: release-plz/action@v0.5.128
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.release_plz_token.outputs.token }}
