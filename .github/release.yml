changelog:
  exclude:
    authors:
      - dependabot
      - github-actions
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - bugfix
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "📝 Documentation"
      labels:
        - docs
        - documentation
    - title: "🧰 Maintenance"
      labels:
        - chore
        - ci
        - refactor
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## What's Changed

  $CHANGES

  ## Release Integrity

  - GitHub Releases include SHA256SUMS, SPDX SBOMs, keyless cosign signatures/certificates, and SLSA provenance when published from CI.

  ## Contributors

  $CONTRIBUTORS
