<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ato Local Registry - Catalog Mock</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <div class="brand">
          <div class="brand-logo">A</div>
          <div style="font-weight: 700;">Ato Local Registry</div>
        </div>
        <div class="status-online">
          <span class="dot"></span>
          Online (localhost:8080)
        </div>
        <div class="trust-badge warn">⚠ Personal (Unverified)</div>
        <div id="activeProcessBadge" class="status-online" style="margin-left:8px;">
          <span class="dot"></span>
          Processes: checking...
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <h1>Own Your Store in Seconds</h1>
        <p>実行優先のローカルレジストリUI。検索して、互換性を確認して、すぐ動かす。</p>
      </section>

      <section class="catalog-wrap">
        <div class="catalog-toolbar">
          <input id="searchInput" class="search" placeholder="Search capsules (name / publisher / tag)" />
          <div class="os-filters">
            <button class="os-pill active" data-os="all">OS: All</button>
            <button class="os-pill" data-os="darwin">macOS</button>
            <button class="os-pill" data-os="linux">Linux</button>
            <button class="os-pill" data-os="windows">Windows</button>
          </div>
        </div>

        <div class="catalog-subbar">
          <div class="view-toggle">
            <button id="listViewBtn" class="btn active">List</button>
            <button id="iconViewBtn" class="btn">Icon</button>
          </div>
          <div class="publish-actions">
            <input id="folderPicker" type="file" webkitdirectory directory multiple hidden />
            <button id="pickFolderBtn" class="btn">＋ Select Folder</button>
            <button id="publishFolderBtn" class="btn primary" disabled>Publish Folder</button>
          </div>
        </div>

        <div id="publishInfo" class="publish-info" style="display:none;"></div>

        <div id="catalogGrid" class="catalog-list"></div>

        <div id="emptyState" class="empty-state" style="display:none;">
          <h4>Empty Registry State</h4>
          <div style="color: var(--fg-secondary); font-size: 14px;">初回公開の導線だけを強調し、最短で一覧表示に到達させる。</div>
          <pre id="publishCmd">ato publish --registry http://localhost:8080 --artifact ./dist/my-app.capsule</pre>
          <div style="margin-top:8px;"><button id="copyPublish" class="btn">Copy Publish Command</button></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <script src="./mock-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
