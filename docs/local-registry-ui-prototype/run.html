<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ato Local Registry - Runner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <div class="brand">
          <div class="brand-logo">A</div>
          <a href="./index.html" style="font-weight:700; text-decoration:none; color:inherit;">Ato Local Registry Runner</a>
        </div>
        <div class="status-online">
          <span class="dot"></span>
          Process Active
        </div>
      </div>
    </header>

    <main class="shell" style="padding-top: 16px;">
      <section class="catalog-wrap">
        <h2 style="margin-top:0;">Process Logs</h2>
        <div id="runnerMeta" style="color: var(--fg-secondary); margin-bottom: 10px;"></div>
        <div id="runnerState" class="process-badge" style="margin-bottom:8px;">● Active</div>
        <pre id="runnerLog" class="runner-log mono"></pre>
        <div style="margin-top: 10px; display:flex; gap:8px;">
          <button class="btn" onclick="window.close()">Close Tab</button>
          <button class="btn" onclick="window.location.href='./index.html'">Back to Catalog</button>
        </div>
      </section>
    </main>
  </body>
</html>
