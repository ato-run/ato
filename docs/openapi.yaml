openapi: 3.1.0
info:
  title: ato local registry API
  version: "current"
  description: >
    Current HTTP API implemented by the local registry server.

servers:
  - url: http://127.0.0.1:9090

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }

    YankedErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [yanked]
          properties:
            yanked: { type: boolean }
            yanked_at: { type: string, nullable: true }

    WellKnownResponse:
      type: object
      required: [url, name, version, write_auth_required]
      properties:
        url: { type: string, format: uri }
        name: { type: string }
        version: { type: string }
        write_auth_required: { type: boolean }

    PublisherInfo:
      type: object
      required: [handle, authorDid, verified]
      properties:
        handle: { type: string }
        authorDid: { type: string }
        verified: { type: boolean }

    StoreMetadataPayload:
      type: object
      properties:
        icon_path: { type: string, nullable: true }
        text: { type: string, nullable: true }
        icon_url: { type: string, format: uri, nullable: true }

    RuntimeTargetConfig:
      type: object
      properties:
        port:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        env:
          type: object
          additionalProperties:
            type: string

    CapsuleRuntimeConfig:
      type: object
      properties:
        selected_target:
          type: string
          nullable: true
        targets:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RuntimeTargetConfig'

    SearchCapsuleRow:
      type: object
      required:
        - id
        - slug
        - scoped_id
        - scopedId
        - name
        - description
        - category
        - type
        - price
        - currency
        - publisher
        - latestVersion
        - latestSizeBytes
        - downloads
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        slug: { type: string }
        scoped_id: { type: string }
        scopedId: { type: string }
        name: { type: string }
        description: { type: string }
        category: { type: string }
        type: { type: string }
        price: { type: integer, minimum: 0 }
        currency: { type: string }
        publisher:
          $ref: '#/components/schemas/PublisherInfo'
        latestVersion: { type: string }
        latestSizeBytes: { type: integer, minimum: 0 }
        downloads: { type: integer, minimum: 0 }
        createdAt: { type: string }
        updatedAt: { type: string }
        store_metadata:
          $ref: '#/components/schemas/StoreMetadataPayload'

    SearchResponse:
      type: object
      required: [capsules]
      properties:
        capsules:
          type: array
          items:
            $ref: '#/components/schemas/SearchCapsuleRow'
        next_cursor:
          type: string
          nullable: true

    CapsuleReleaseRow:
      type: object
      required: [version, content_hash, signature_status]
      properties:
        version: { type: string }
        content_hash: { type: string }
        signature_status: { type: string }

    CapsuleDetailResponse:
      type: object
      required:
        - id
        - scoped_id
        - slug
        - name
        - description
        - price
        - currency
        - latestVersion
        - releases
        - publisher
      properties:
        id: { type: string }
        scoped_id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: integer }
        currency: { type: string }
        latestVersion: { type: string }
        releases:
          type: array
          items:
            $ref: '#/components/schemas/CapsuleReleaseRow'
        publisher:
          $ref: '#/components/schemas/PublisherInfo'
        manifest:
          type: object
          nullable: true
          additionalProperties: true
        manifest_toml:
          type: string
          nullable: true
        capsule_lock:
          type: string
          nullable: true
        repository:
          type: string
          nullable: true
        readme_markdown:
          type: string
          nullable: true
        readme_source:
          type: string
          nullable: true
        store_metadata:
          $ref: '#/components/schemas/StoreMetadataPayload'
        runtime_config:
          $ref: '#/components/schemas/CapsuleRuntimeConfig'

    DistributionResponse:
      type: object
      required:
        - version
        - artifact_url
        - sha256
        - blake3
        - file_name
        - signature_status
        - publisher_verified
      properties:
        version: { type: string }
        artifact_url: { type: string, format: uri }
        sha256: { type: string }
        blake3: { type: string }
        file_name: { type: string }
        signature_status: { type: string }
        publisher_verified: { type: boolean }

    ChunkBloomFilterRequest:
      type: object
      required: [m_bits, k_hashes, seed, bitset_base64]
      properties:
        m_bits: { type: integer, minimum: 1 }
        k_hashes: { type: integer, minimum: 1 }
        seed: { type: integer }
        bitset_base64: { type: string }

    NegotiateRequest:
      type: object
      required: [scoped_id, target_manifest_hash]
      properties:
        scoped_id: { type: string }
        target_manifest_hash: { type: string }
        have_chunks:
          type: array
          items: { type: string }
        have_chunks_bloom:
          allOf:
            - $ref: '#/components/schemas/ChunkBloomFilterRequest'
          nullable: true
        reuse_lease_id:
          type: string
          nullable: true
        max_bytes:
          type: integer
          nullable: true

    EpochPointer:
      type: object
      required:
        - scoped_id
        - epoch
        - manifest_hash
        - issued_at
        - signer_did
        - key_id
        - signature
      properties:
        scoped_id: { type: string }
        epoch: { type: integer }
        manifest_hash: { type: string }
        prev_epoch_hash:
          type: string
          nullable: true
        issued_at: { type: string }
        signer_did: { type: string }
        key_id: { type: string }
        signature: { type: string }

    NegotiateResponse:
      type: object
      required: [session_id, required_chunks, required_manifests]
      properties:
        session_id: { type: string }
        required_chunks:
          type: array
          items: { type: string }
        required_manifests:
          type: array
          items: { type: string }
        yanked: { type: boolean, default: false }
        epoch_pointer:
          $ref: '#/components/schemas/EpochPointer'
        lease_id:
          type: string
          nullable: true
        lease_expires_at:
          type: string
          nullable: true

    RegistryVersionResolveRecord:
      type: object
      required: [scoped_id, version, manifest_hash]
      properties:
        scoped_id: { type: string }
        version: { type: string }
        manifest_hash: { type: string }
        yanked_at:
          type: string
          nullable: true

    EpochResolveRequest:
      type: object
      required: [scoped_id]
      properties:
        scoped_id: { type: string }

    EpochResolveResponse:
      type: object
      required: [pointer, public_key]
      properties:
        pointer:
          $ref: '#/components/schemas/EpochPointer'
        public_key: { type: string }

    LeaseRefreshRequest:
      type: object
      required: [lease_id]
      properties:
        lease_id: { type: string }
        ttl_secs:
          type: integer
          nullable: true

    LeaseRefreshResult:
      type: object
      required: [lease_id, expires_at, chunk_count]
      properties:
        lease_id: { type: string }
        expires_at: { type: string }
        chunk_count: { type: integer }

    LeaseReleaseRequest:
      type: object
      required: [lease_id]
      properties:
        lease_id: { type: string }

    LeaseReleaseResponse:
      type: object
      required: [released]
      properties:
        released: { type: integer }

    KeyRotateRequest:
      type: object
      properties:
        overlap_hours:
          type: integer
          nullable: true

    KeyRotateResponse:
      type: object
      required: [signer_did, key_id, public_key, valid_from]
      properties:
        signer_did: { type: string }
        key_id: { type: string }
        public_key: { type: string }
        valid_from: { type: string }
        previous_key_id:
          type: string
          nullable: true
        previous_valid_to:
          type: string
          nullable: true

    KeyRevokeRequest:
      type: object
      required: [key_id]
      properties:
        key_id: { type: string }
        did:
          type: string
          nullable: true

    KeyRevokeResponse:
      type: object
      required: [revoked]
      properties:
        revoked: { type: integer }
        active_key_rotated_to:
          type: string
          nullable: true

    RollbackRequest:
      type: object
      required: [scoped_id, target_manifest_hash]
      properties:
        scoped_id: { type: string }
        target_manifest_hash: { type: string }

    YankRequest:
      type: object
      required: [scoped_id, target_manifest_hash]
      properties:
        scoped_id: { type: string }
        target_manifest_hash: { type: string }

    YankResponse:
      type: object
      required: [scoped_id, target_manifest_hash, yanked]
      properties:
        scoped_id: { type: string }
        target_manifest_hash: { type: string }
        yanked: { type: boolean }

    UploadResponse:
      type: object
      required:
        - scoped_id
        - version
        - artifact_url
        - file_name
        - sha256
        - blake3
        - size_bytes
        - already_existed
      properties:
        scoped_id: { type: string }
        version: { type: string }
        artifact_url: { type: string, format: uri }
        file_name: { type: string }
        sha256: { type: string }
        blake3: { type: string }
        size_bytes: { type: integer }
        already_existed: { type: boolean }

    UpsertStoreMetadataRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed: { type: boolean }
        icon_path:
          type: string
          nullable: true
        text:
          type: string
          nullable: true

    UpdateStoreMetadataResponse:
      type: object
      required: [updated, scoped_id, store_metadata]
      properties:
        updated: { type: boolean }
        scoped_id: { type: string }
        store_metadata:
          $ref: '#/components/schemas/StoreMetadataPayload'

    RuntimeTargetConfigRequest:
      type: object
      properties:
        port:
          type: integer
          nullable: true
        env:
          type: object
          nullable: true
          additionalProperties:
            type: string

    UpsertRuntimeConfigRequest:
      type: object
      properties:
        selected_target:
          type: string
          nullable: true
        targets:
          type: object
          nullable: true
          additionalProperties:
            $ref: '#/components/schemas/RuntimeTargetConfigRequest'

    RunCapsuleRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed: { type: boolean }
        target:
          type: string
          nullable: true
        port:
          type: integer
          nullable: true
        env:
          type: object
          nullable: true
          additionalProperties:
            type: string

    RunCapsuleResponse:
      type: object
      required: [accepted, scoped_id]
      properties:
        accepted: { type: boolean }
        scoped_id: { type: string }
        requested_target:
          type: string
          nullable: true
        requested_port:
          type: integer
          nullable: true

    DeleteCapsuleResponse:
      type: object
      required: [deleted, scoped_id, removed_capsule, removed_versions]
      properties:
        deleted: { type: boolean }
        scoped_id: { type: string }
        removed_capsule: { type: boolean }
        removed_versions: { type: integer }
        removed_version:
          type: string
          nullable: true

    ProcessRowResponse:
      type: object
      required: [id, name, pid, status, active, runtime, started_at]
      properties:
        id: { type: string }
        name: { type: string }
        pid: { type: integer }
        status: { type: string, enum: [running, stopped, unknown] }
        active: { type: boolean }
        runtime: { type: string }
        started_at: { type: string }
        scoped_id:
          type: string
          nullable: true
        target_label:
          type: string
          nullable: true

    UrlReadyResponse:
      type: object
      required: [ready]
      properties:
        ready: { type: boolean }
        status:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true

    StopProcessRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed: { type: boolean }
        force:
          type: boolean
          nullable: true

    StopProcessResponse:
      type: object
      required: [stopped]
      properties:
        stopped: { type: boolean }

    ProcessLogsResponse:
      type: object
      required: [lines, updated_at]
      properties:
        lines:
          type: array
          items: { type: string }
        updated_at: { type: string }

    ClearLogsResponse:
      type: object
      required: [cleared]
      properties:
        cleared: { type: boolean }

paths:
  /.well-known/capsule.json:
    get:
      operationId: getWellKnownCapsule
      responses:
        "200":
          description: Registry discovery info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellKnownResponse'

  /v1/manifest/capsules:
    get:
      operationId: searchCapsules
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/capsules/by/{publisher}/{slug}:
    get:
      operationId: getCapsule
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Capsule detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapsuleDetailResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/capsules/by/{publisher}/{slug}/distributions:
    get:
      operationId: getDistributions
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: version
          schema: { type: string }
      responses:
        "200":
          description: Distribution info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/capsules/by/{publisher}/{slug}/download:
    get:
      operationId: redirectDownload
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: version
          schema: { type: string }
      responses:
        "302":
          description: Redirect to artifact
          headers:
            Location:
              schema: { type: string }
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/negotiate:
    post:
      operationId: negotiateManifest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NegotiateRequest'
      responses:
        "200":
          description: Negotiation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiateResponse'
        "410":
          description: Manifest yanked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YankedErrorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/resolve/{publisher}/{slug}/{version}:
    get:
      operationId: resolveManifestVersion
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Resolved version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryVersionResolveRecord'
        "410":
          description: Manifest yanked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YankedErrorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/documents/{manifest_hash}:
    get:
      operationId: getManifestDocument
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: manifest_hash
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Manifest document
          content:
            application/toml:
              schema:
                type: string
                format: binary
        "410":
          description: Manifest yanked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YankedErrorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/chunks/{chunk_hash}:
    get:
      operationId: getManifestChunk
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: chunk_hash
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Chunk bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/epoch/resolve:
    post:
      operationId: resolveEpochPointer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpochResolveRequest'
      responses:
        "200":
          description: Epoch pointer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochResolveResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/leases/refresh:
    post:
      operationId: refreshLease
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseRefreshRequest'
      responses:
        "200":
          description: Refreshed lease
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRefreshResult'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/leases/release:
    post:
      operationId: releaseLease
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseReleaseRequest'
      responses:
        "200":
          description: Released lease
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseReleaseResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/keys/rotate:
    post:
      operationId: rotateManifestKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRotateRequest'
      responses:
        "200":
          description: Rotated key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyRotateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/keys/revoke:
    post:
      operationId: revokeManifestKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRevokeRequest'
      responses:
        "200":
          description: Revoked key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyRevokeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/rollback:
    post:
      operationId: rollbackManifest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        "200":
          description: Rollback result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochResolveResponse'
        "409":
          description: Rollback conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/manifest/yank:
    post:
      operationId: yankManifest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YankRequest'
      responses:
        "200":
          description: Yanked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YankResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/artifacts/{publisher}/{slug}/{version}/{file_name}:
    get:
      operationId: getArtifact
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
        - in: path
          name: file_name
          required: true
          schema: { type: string, pattern: '.*\.capsule$' }
      responses:
        "200":
          description: Artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/local/capsules/{publisher}/{slug}/{version}:
    put:
      operationId: uploadLocalCapsule
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: publisher
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
        - in: query
          name: file_name
          schema: { type: string, pattern: '.*\.capsule$' }
        - in: query
          name: allow_existing
          schema: { type: boolean }
        - in: header
          name: x-ato-sha256
          required: true
          schema: { type: string }
        - in: header
          name: x-ato-blake3
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
