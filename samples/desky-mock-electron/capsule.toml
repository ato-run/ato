schema_version = "0.3"
name = "desky-mock-electron"
version = "0.1.0"
type = "app"
runtime = "source"
driver = "electron"
run = "python3 backend/server.py"
working_dir = "."

[metadata.desky_guest]
adapter = "electron"
frontend_entry = "frontend/index.html"
transport = "http"
rpc_path = "/rpc"
health_path = "/health"
default_port = 43125
capabilities = [
  "ping",
  "app.invoke",
  "plugin:window|setTitle",
  "plugin:fs|readFile",
  "shell.open",
]
