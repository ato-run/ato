schema_version = "0.3"
name = "desky-mock-tauri"
version = "0.1.0"
type = "app"
runtime = "source"
driver = "tauri"
run = "python3 backend/server.py"
working_dir = "."

[metadata.ato_desktop_guest]
adapter = "tauri"
frontend_entry = "frontend/index.html"
transport = "http"
rpc_path = "/rpc"
health_path = "/health"
default_port = 43123
capabilities = [
	"ping",
	"app.invoke",
	"plugin:window|setTitle",
	"plugin:dialog|open",
	"plugin:fs|readFile",
	"shell.open",
]
