# cargo-dist configuration for the `ato-run/ato` monorepo.
#
# **Scope**: this file is intentionally CLI-only. The Desktop bundle
# is built by the `xtask` crate driven by `desktop-release.yml`, NOT
# by cargo-dist. Mixing both would force cargo-dist to crawl the GPUI
# / WebKit native deps, which it isn't designed to package.
#
# The `packages = ["ato-cli"]` line is the load-bearing scope filter:
# without it, cargo-dist would pick up every workspace member and try
# to publish artifacts for `ato-desktop`, `xtask`, `lock-draft-engine`,
# etc. With it, only the `ato-cli` binary feeds the Homebrew Formula
# and CLI MSI installer.
#
# Tag prefix routing:
#   - `v*`             → triggers cargo-dist's CLI release.yml
#   - `ato-desktop-v*` → triggers .github/workflows/desktop-release.yml
# The two workflows are never invoked by the same tag.

[workspace]
members = ["cargo:."]

[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Restrict cargo-dist to the CLI binary plus nacelle (the Source
# Runtime). Desktop is owned by xtask. nacelle ships as its own
# tarball/MSI so install.sh can fetch it from the same release as
# ato-cli (instead of the legacy Koh0920/capsuled tag).
packages = ["ato-cli", "nacelle"]
# Force per-package builds so workspace-wide `cargo build` doesn't pull in
# ato-desktop's GTK/GPUI native deps on Linux runners.
precise-builds = true
# The installers to generate for each app.
# - homebrew → Formula in ato-run/homebrew-ato (CLI-only, alongside Cask).
# - msi      → CLI MSI for `--cli-only` Windows install (PR-7).
#              Desktop MSI is built separately by xtask + WiX (PR-7).
installers = ["homebrew", "msi"]
# Homebrew tap repository
tap = "ato-run/homebrew-ato"
# Publish jobs to run on release
publish-jobs = ["homebrew"]
# Keep the generated workflow hand-edited so cargo-dist only responds to
# `v*` CLI tags and never races the desktop `ato-desktop-v*` workflow.
allow-dirty = ["ci"]
# Target platforms to build apps for (Rust target-triple syntax)
# Intel Mac (x86_64-apple-darwin) is unsupported.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
