schema_version = "0.2"
name = "airgap-npm-fallback-capsule"
version = "0.1.0"
type = "app"
default_target = "cli"

[network]
egress_allow = [
  "registry.npmjs.org",
  "npmjs.org",
  "jsr.io",
  "deno.land",
  "esm.sh",
  "cdn.jsdelivr.net",
  "raw.githubusercontent.com",
  "gist.githubusercontent.com"
]

[targets.cli]
runtime = "source"
driver = "deno"
runtime_version = "1.46.3"
entrypoint = "main.ts"
